<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23006600%22/><text y=%22.9em%22 font-size=%2270%22 x=%2250%25%22 dominant-baseline=%22auto%22 text-anchor=%22middle%22>🤝</text></svg>">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - GhanaArtisan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="firebase-init.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="data.js"></script>
    <script src="nav.js"></script>
    <style id="shared-css"></style>
    <style>
        /* ===== ADMIN LOGIN MODAL ===== */
        .admin-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 3000;
            align-items: center; justify-content: center; padding: 1.5rem;
        }
        .admin-overlay.active { display: flex; }

        .admin-login-modal {
            background: white; border-radius: 20px; width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); position: relative;
            animation: popIn 0.28s ease; margin: auto;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.93) translateY(-16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .alm-header {
            background: linear-gradient(135deg, #004400, #006600);
            padding: 2rem; border-radius: 20px 20px 0 0; text-align: center;
            position: relative;
        }
        .alm-header .shield-icon {
            width: 70px; height: 70px; background: rgba(255,255,255,0.15);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem; font-size: 2rem; color: white;
        }
        .alm-header h2 { color: white; font-family: 'Poppins', sans-serif; margin-bottom: 0.3rem; }
        .alm-header p  { color: rgba(255,255,255,0.8); font-size: 0.88rem; }
        .alm-close {
            position: absolute; top: 1rem; right: 1rem;
            background: rgba(255,255,255,0.15); border: none; color: white;
            width: 30px; height: 30px; border-radius: 50%; font-size: 1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .alm-close:hover { background: rgba(255,255,255,0.3); }
        .alm-body { padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
        .alm-body label { color: #006600; font-weight: 600; font-size: 0.88rem; display: block; margin-bottom: 4px; }
        .alm-btn {
            width: 100%; padding: 13px; background: #CE1126; color: white; border: none;
            border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer;
            font-family: 'Inter', sans-serif; display: flex; align-items: center;
            justify-content: center; gap: 8px; transition: background 0.2s;
        }
        .alm-btn:hover { background: #a00d1e; }
        .alm-back { display: block; text-align: center; margin-top: 0.5rem; color: #888; font-size: 0.88rem; text-decoration: none; }
        .alm-back:hover { color: #006600; }

        /* ===== DASHBOARD ===== */
        .dashboard-wrap {
            display: none; min-height: 100vh;
        }
        .admin-sidebar {
            width: 250px; background: #006600; min-height: 100vh;
            padding: 1.5rem; position: fixed; top: 0; left: 0; overflow-y: auto; z-index: 500;
        }
        .sidebar-logo {
            color: white; font-family: 'Poppins', sans-serif; font-size: 1.2rem; font-weight: 700;
            display: flex; align-items: center; gap: 8px; margin-bottom: 0.3rem;
        }
        .sidebar-sub { color: rgba(255,255,255,0.65); font-size: 0.78rem; margin-bottom: 2rem; padding-left: 2px; }
        .sbtn {
            width: 100%; text-align: left; background: rgba(255,255,255,0.1); color: white;
            border: none; padding: 0.85rem 1rem; border-radius: 8px; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 0.88rem;
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 0.35rem; transition: background 0.2s;
        }
        .sbtn:hover, .sbtn.active { background: rgba(255,255,255,0.22); }
        .sbtn.logout { background: #CE1126; margin-top: 1.5rem; }
        .sbtn.logout:hover { background: #a00d1e; }

        .admin-main { margin-left: 250px; padding: 2rem; background: #f4f4f4; min-height: 100vh; }

        /* Stat cards */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); gap: 1.2rem; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 12px; padding: 1.4rem; box-shadow: 0 3px 12px rgba(0,0,0,0.07); text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 700; color: #006600; font-family: 'Poppins', sans-serif; }
        .stat-lbl { color: #888; font-size: 0.82rem; margin-top: 3px; }

        /* Table */
        .table-wrap { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 3px 12px rgba(0,0,0,0.07); margin-bottom: 1.5rem; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; min-width: 500px; }
        thead tr { background: #006600; color: white; }
        thead th { padding: 0.9rem 1rem; text-align: left; font-weight: 600; white-space: nowrap; }
        tbody tr { border-bottom: 1px solid #eee; }
        tbody tr:last-child { border-bottom: none; }
        tbody td { padding: 0.8rem 1rem; color: #333; vertical-align: middle; }
        tbody tr:hover { background: #fafafa; }

        .tbtn {
            padding: 4px 11px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 0.8rem; font-weight: 600; margin-right: 3px; transition: opacity 0.2s;
        }
        .tbtn:hover { opacity: 0.82; }
        .tbtn.green { background: #25D366; color: white; }
        .tbtn.red   { background: #CE1126; color: white; }
        .tbtn.blue  { background: #006600; color: white; }

        /* Edit / register form */
        .edit-card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 3px 12px rgba(0,0,0,0.07); }
        .eg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        @media(max-width:600px){ .eg2 { grid-template-columns: 1fr; } }
        .elabel { color: #006600; font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 4px; }
        .ev-row { display: flex; align-items: center; gap: 10px; margin: 0.8rem 0; }
        .ev-row input { width: auto; }
        .ev-row label { color: #006600; font-weight: 600; font-size: 0.9rem; }

        .pbar-wrap { background: #eee; border-radius: 4px; height: 8px; overflow: hidden; margin-top: 5px; }
        .pbar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

        /* Mobile sidebar */
        .sidebar-toggle { display: none; position: fixed; top: 12px; left: 12px; z-index: 600; background: #006600; color: white; border: none; border-radius: 8px; padding: 8px 11px; cursor: pointer; font-size: 1rem; }
        @media(max-width: 768px){
            .admin-sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .admin-sidebar.open { transform: translateX(0); }
            .admin-main { margin-left: 0; }
            .sidebar-toggle { display: block; }
        }
    </style>
</head>
<body>
    <!-- Admin Login Modal -->
    <div class="admin-overlay active" id="admin-overlay">
        <div class="admin-login-modal">
            <div class="alm-header">
                <button class="alm-close" onclick="goBack()" title="Back to site">&times;</button>
                <div class="shield-icon"><i class="fas fa-user-shield"></i></div>
                <h2>Admin Login</h2>
                <p>GhanaArtisan Administration Panel</p>
            </div>
            <div class="alm-body">
                <div>
                    <label>Username</label>
                    <input type="text" id="admin-username" placeholder="Enter admin username">
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" id="admin-password" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') doAdminLogin()">
                </div>
                <button class="alm-btn" onclick="doAdminLogin()">
                    <i class="fas fa-sign-in-alt"></i> Login as Admin
                </button>
                <a href="index.html" class="alm-back"><i class="fas fa-arrow-left"></i> Back to Website</a>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard (hidden until login) -->
    <div class="dashboard-wrap" id="dashboard-wrap">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

        <div class="admin-sidebar" id="admin-sidebar">
            <div class="sidebar-logo"><i class="fas fa-user-shield"></i> Admin Panel</div>
            <div class="sidebar-sub">GhanaArtisan Management</div>
            <button class="sbtn active" onclick="showSection('dashboard')"><i class="fas fa-chart-bar"></i> Dashboard</button>
            <button class="sbtn" onclick="showSection('job-requests')"><i class="fas fa-clipboard-list"></i> Job Requests <span id="jr-badge" style="background:#FF9900;color:white;font-size:0.72rem;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:auto;"></span></button>
            <button class="sbtn" onclick="showSection('artisans')"><i class="fas fa-tools"></i> Artisans</button>
            <button class="sbtn" onclick="showSection('customers')"><i class="fas fa-users"></i> Customers</button>
            <button class="sbtn" onclick="showSection('verifications')"><i class="fas fa-check-circle"></i> Verifications <span id="verify-badge" style="background:#FF9900;color:white;font-size:0.72rem;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:auto;"></span></button>
            <button class="sbtn" onclick="showSection('work-updates')"><i class="fas fa-camera"></i> Work Updates <span id="wu-badge" style="background:#1e90ff;color:white;font-size:0.72rem;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:auto;"></span></button>
            <button class="sbtn" onclick="showSection('payments')"><i class="fas fa-credit-card"></i> Payments</button>
            <button class="sbtn" onclick="showSection('reports')"><i class="fas fa-file-alt"></i> Reports</button>
            <button class="sbtn" onclick="showSection('register-artisan')"><i class="fas fa-user-plus"></i> Register Artisan</button>
            <button class="sbtn logout" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="admin-main" id="admin-content"></div>
    </div>

    <script>
        document.getElementById('shared-css').innerHTML = sharedCSS;

        function goBack() { window.location.href = 'index.html'; }

        // ---- Admin Login ----
        async function doAdminLogin() {
            const u = document.getElementById('admin-username').value.trim();
            const p = document.getElementById('admin-password').value;
            if (u === adminCredentials.username && p === adminCredentials.password) {
                // Show loading state on button
                const btn = document.querySelector('.alm-btn');
                if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading data...'; }
                showNotification('Loading data from Firebase...', 'info');
                try {
                    await initAppData();
                    document.getElementById('admin-overlay').classList.remove('active');
                    document.getElementById('dashboard-wrap').style.display = 'block';
                    showSection('dashboard');
                    showNotification('Welcome, Admin ARTISANCONNECT! (' + sampleArtisans.length + ' artisans loaded)', 'success');
                } catch(err) {
                    console.error('Login error:', err);
                    showNotification('Error loading data. Check internet connection.', 'error');
                    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login'; }
                }
            } else {
                showNotification('Invalid admin credentials', 'error');
            }
        }

        function adminLogout() {
            document.getElementById('dashboard-wrap').style.display = 'none';
            document.getElementById('admin-username').value = '';
            document.getElementById('admin-password').value = '';
            document.getElementById('admin-overlay').classList.add('active');
            showNotification('Admin logged out', 'info');
        }

        function toggleSidebar() {
            document.getElementById('admin-sidebar').classList.toggle('open');
        }

        function setActiveBtn(section) {
            document.querySelectorAll('.sbtn:not(.logout)').forEach(b => b.classList.remove('active'));
            const map  = ['dashboard','job-requests','artisans','verifications','work-updates','payments','reports','register-artisan'];
            const btns = document.querySelectorAll('.sbtn:not(.logout)');
            const idx  = map.indexOf(section);
            if (idx >= 0 && btns[idx]) btns[idx].classList.add('active');

            // Update pending job requests badge
            const pendingJobs = serviceRequests.filter(r => r.status === 'pending_admin').length;
            const jrBadge = document.getElementById('jr-badge');
            if (jrBadge) jrBadge.textContent = pendingJobs > 0 ? pendingJobs : '';

            // Update pending verification badge
            const pendingVerify = sampleArtisans.filter(a => !a.verified).length;
            const vBadge = document.getElementById('verify-badge');
            if (vBadge) vBadge.textContent = pendingVerify > 0 ? pendingVerify : '';

            // Update work updates badge
            const wuCount = sampleArtisans.reduce((s, a) => s + (a.workUpdates?.length || 0), 0);
            const wuBadge = document.getElementById('wu-badge');
            if (wuBadge) wuBadge.textContent = wuCount > 0 ? wuCount : '';
        }

        // ---- Section renderer ----
        function showSection(section) {
            setActiveBtn(section);
            const el       = document.getElementById('admin-content');
            const pending  = sampleArtisans.filter(a => !a.verified);
            const verified = sampleArtisans.filter(a => a.verified);
            let allPayments = [];
            sampleArtisans.forEach(a => { if (a.payments) allPayments = allPayments.concat(a.payments.map(p => ({...p, artisanName: a.name}))); });
            const totalRev     = allPayments.reduce((s,p) => s + (parseFloat(p.amount.replace('₵','')) || 0), 0);
            const completedPay = allPayments.filter(p => p.status === 'completed');
            const pendingPay   = allPayments.filter(p => p.status === 'pending');

            switch(section) {

                // ---- JOB REQUESTS ----
                case 'job-requests':
                    const allReqs = serviceRequests;
                    const pendingReqs    = allReqs.filter(r => r.status === 'pending_admin');
                    const approvedReqs   = allReqs.filter(r => r.status === 'approved');
                    const reassignedReqs = allReqs.filter(r => r.status === 'reassigned');

                    el.innerHTML = `
                        <h2 style="color:#006600;margin-bottom:0.3rem;font-family:'Poppins',sans-serif;"><i class="fas fa-clipboard-list"></i> Job Requests</h2>
                        <p style="color:#888;font-size:0.88rem;margin-bottom:1.5rem;">All customer service requests. Approve, reassign, or reject each one.</p>

                        <div class="stat-grid" style="margin-bottom:1.5rem;">
                            <div class="stat-card"><div class="stat-val" style="color:#FF9900;">${pendingReqs.length}</div><div class="stat-lbl">Awaiting Action</div></div>
                            <div class="stat-card"><div class="stat-val" style="color:#25D366;">${approvedReqs.length}</div><div class="stat-lbl">Approved</div></div>
                            <div class="stat-card"><div class="stat-val" style="color:#1e90ff;">${reassignedReqs.length}</div><div class="stat-lbl">Reassigned</div></div>
                            <div class="stat-card"><div class="stat-val">${allReqs.length}</div><div class="stat-lbl">Total Requests</div></div>
                        </div>

                        ${pendingReqs.length > 0 ? `
                        <h3 style="color:#cc7700;margin-bottom:1rem;font-family:'Poppins',sans-serif;font-size:1rem;">
                            <i class="fas fa-clock"></i> Pending Approval (${pendingReqs.length})
                        </h3>
                        <div style="display:grid;gap:1rem;margin-bottom:2rem;">
                            ${pendingReqs.map(r => jobRequestCardHTML(r)).join('')}
                        </div>` : ''}

                        ${approvedReqs.length > 0 || reassignedReqs.length > 0 ? `
                        <h3 style="color:#006600;margin-bottom:1rem;font-family:'Poppins',sans-serif;font-size:1rem;">
                            <i class="fas fa-check-circle"></i> Processed Requests
                        </h3>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>Customer</th><th>Artisan</th><th>Description</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
                                <tbody>
                                ${[...approvedReqs, ...reassignedReqs].map(r => `<tr>
                                    <td><strong>${r.clientName}</strong><br><span style="color:#888;font-size:0.78rem;">${r.clientPhone}</span></td>
                                    <td>${r.artisanName}</td>
                                    <td style="max-width:200px;font-size:0.85rem;">${r.description.substring(0,60)}${r.description.length>60?'...':''}</td>
                                    <td>${r.date}</td>
                                    <td><span class="status-${r.status==='approved'?'verified':'pending'}">${r.status}</span></td>
                                    <td><button onclick="showReassignModal(${r.id})" class="tbtn blue">Reassign</button></td>
                                </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>` : ''}

                        ${allReqs.length === 0 ? `
                        <div class="edit-card" style="text-align:center;padding:3rem;">
                            <i class="fas fa-clipboard-list" style="font-size:3rem;color:#ddd;margin-bottom:1rem;display:block;"></i>
                            <h3 style="color:#888;">No job requests yet</h3>
                            <p style="color:#aaa;">Customer requests will appear here.</p>
                        </div>` : ''}

                        <!-- Reassign Modal -->
                        <div id="reassign-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:3000;align-items:center;justify-content:center;padding:1.5rem;" onclick="closeReassign(event)">
                            <div style="background:white;border-radius:16px;max-width:480px;width:100%;padding:0;overflow:hidden;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);">
                                <div style="background:linear-gradient(135deg,#1e90ff,#006600);padding:1.5rem 2rem;color:white;">
                                    <h3 style="font-family:'Poppins',sans-serif;margin-bottom:0.2rem;">Reassign Job Request</h3>
                                    <p style="opacity:.85;font-size:0.85rem;" id="reassign-label">Select a different artisan</p>
                                </div>
                                <div style="padding:1.8rem;display:flex;flex-direction:column;gap:1rem;">
                                    <div>
                                        <label style="color:#555;font-weight:600;font-size:0.82rem;display:block;margin-bottom:4px;">Reassign to Artisan</label>
                                        <select id="reassign-artisan-sel" style="width:100%;"></select>
                                    </div>
                                    <div>
                                        <label style="color:#555;font-weight:600;font-size:0.82rem;display:block;margin-bottom:4px;">Note for Customer (optional)</label>
                                        <textarea id="reassign-note" rows="3" placeholder="e.g. Your original artisan is unavailable. We have assigned a specialist in your area." style="width:100%;"></textarea>
                                    </div>
                                    <div style="display:flex;gap:0.8rem;">
                                        <button onclick="confirmReassign()" style="flex:1;padding:12px;background:#1e90ff;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;">
                                            <i class="fas fa-exchange-alt"></i> Confirm Reassign
                                        </button>
                                        <button onclick="closeReassign()" style="padding:12px 20px;background:#eee;color:#555;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                // ---- DASHBOARD ----
                case 'dashboard':
                    const wuTotal = sampleArtisans.reduce((s,a) => s + (a.workUpdates?.length||0), 0);
                    const pendingJobsCount = serviceRequests.filter(r=>r.status==='pending_admin').length;
                    el.innerHTML = `
                        <h2 style="color:#006600;margin-bottom:1.5rem;font-family:'Poppins',sans-serif;"><i class="fas fa-chart-bar"></i> Dashboard Overview</h2>
                        <div class="stat-grid">
                            <div class="stat-card" style="cursor:pointer;" onclick="showSection('artisans')"><div class="stat-val">${sampleArtisans.length}</div><div class="stat-lbl">Total Artisans</div></div>
                            <div class="stat-card" style="cursor:pointer;" onclick="showSection('verifications')"><div class="stat-val" style="color:#FF9900;">${pending.length}</div><div class="stat-lbl">Pending Verification</div></div>
                            <div class="stat-card" style="cursor:pointer;" onclick="showSection('job-requests')"><div class="stat-val" style="color:#CE1126;">${pendingJobsCount}</div><div class="stat-lbl">Pending Job Requests</div></div>
                            <div class="stat-card" style="cursor:pointer;" onclick="showSection('work-updates')"><div class="stat-val" style="color:#1e90ff;">${wuTotal}</div><div class="stat-lbl">Work Updates</div></div>
                        </div>
                        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem;margin-bottom:2rem;">
                            <div class="edit-card">
                                <h4 style="color:#006600;margin-bottom:1rem;">Payment Status</h4>
                                <div style="margin-bottom:0.8rem;">
                                    <div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:0.88rem;">
                                        <span>Completed</span><strong style="color:#25D366;">${completedPay.length}</strong>
                                    </div>
                                    <div class="pbar-wrap"><div class="pbar-fill" style="width:${allPayments.length?Math.round(completedPay.length/allPayments.length*100):0}%;background:#25D366;"></div></div>
                                </div>
                                <div>
                                    <div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:0.88rem;">
                                        <span>Pending</span><strong style="color:#FF9900;">${pendingPay.length}</strong>
                                    </div>
                                    <div class="pbar-wrap"><div class="pbar-fill" style="width:${allPayments.length?Math.round(pendingPay.length/allPayments.length*100):0}%;background:#FF9900;"></div></div>
                                </div>
                                <div style="margin-top:1rem;text-align:center;">
                                    <strong style="color:#006600;font-size:1.1rem;">₵${totalRev.toFixed(2)}</strong>
                                    <div style="color:#888;font-size:0.78rem;">Total Platform Revenue</div>
                                </div>
                            </div>
                            <div class="edit-card">
                                <h4 style="color:#006600;margin-bottom:1rem;">Recent Artisans</h4>
                                ${sampleArtisans.slice(-5).reverse().map(a => `
                                    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee;">
                                        <div>
                                            <div style="font-weight:500;color:#006600;font-size:0.88rem;">${a.name}</div>
                                            <div style="color:#888;font-size:0.78rem;">${a.category} · ${a.district||'—'}</div>
                                        </div>
                                        <span class="${a.verified?'status-verified':'status-pending'}" style="cursor:pointer;" onclick="showSection('verifications')">${a.verified?'Verified':'Pending'}</span>
                                    </div>`).join('')}
                            </div>
                        </div>`;
                    break;

        // ---- ECOWAS Card auto-formatter (shared by register & edit forms) ----
        function adminIdTypeChange(prefix) {
            const type  = document.getElementById(prefix + '-id-type').value;
            const input = document.getElementById(prefix + '-id-number');
            const hint  = document.getElementById(prefix + '-id-hint');
            input.value = '';
            if (type === 'ecowascard') {
                input.placeholder = 'GHA-XXXXXXXXX-D';
                input.maxLength   = 17;
                if (hint) { hint.textContent = 'Format: GHA-721233479-8'; hint.style.display = 'block'; }
            } else {
                input.placeholder = 'ID Number';
                input.maxLength   = 30;
                if (hint) hint.style.display = 'none';
            }
        }

        function adminFormatId(input, prefix) {
            const type = document.getElementById(prefix + '-id-type').value;
            if (type !== 'ecowascard') return;
            const digits = input.value.replace(/[^0-9]/g, '');
            let formatted = 'GHA-';
            if (digits.length <= 9) {
                formatted += digits;
            } else {
                formatted += digits.substring(0, 9) + '-' + digits.substring(9, 10);
            }
            input.value = formatted;
        }

        function validateEcowasCard(value) {
            return /^GHA-\d{9}-\d$/.test(value);
        }

            return `
            <div style="background:white;border-radius:14px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,0.07);border:1px solid rgba(255,153,0,0.2);">
                <div style="background:rgba(255,153,0,0.06);padding:1rem 1.4rem;border-bottom:1px solid rgba(255,153,0,0.1);display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.8rem;">
                    <div>
                        <div style="font-weight:700;color:#006600;font-family:'Poppins',sans-serif;">${r.clientName}</div>
                        <div style="color:#888;font-size:0.8rem;margin-top:2px;"><i class="fas fa-phone"></i> ${r.clientPhone} &nbsp;|&nbsp; <i class="fas fa-envelope"></i> ${r.clientEmail}</div>
                    </div>
                    <span style="background:rgba(255,153,0,0.15);color:#cc7700;padding:5px 12px;border-radius:20px;font-size:0.78rem;font-weight:700;">
                        <i class="fas fa-clock"></i> Pending Admin Approval
                    </span>
                </div>
                <div style="padding:1.2rem 1.4rem;">
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0.8rem;margin-bottom:1rem;">
                        <div><div style="color:#aaa;font-size:0.75rem;font-weight:600;text-transform:uppercase;">Requested Artisan</div><div style="color:#006600;font-weight:600;font-size:0.9rem;margin-top:3px;">${r.artisanName}</div></div>
                        <div><div style="color:#aaa;font-size:0.75rem;font-weight:600;text-transform:uppercase;">Category</div><div style="color:#006600;font-weight:600;font-size:0.9rem;margin-top:3px;">${cat?.name||r.category}</div></div>
                        <div><div style="color:#aaa;font-size:0.75rem;font-weight:600;text-transform:uppercase;">Location</div><div style="color:#006600;font-weight:600;font-size:0.9rem;margin-top:3px;">${r.district}, ${r.region}</div></div>
                        <div><div style="color:#aaa;font-size:0.75rem;font-weight:600;text-transform:uppercase;">Date</div><div style="color:#006600;font-weight:600;font-size:0.9rem;margin-top:3px;">${r.date}</div></div>
                    </div>
                    <div style="background:#f8f8f8;border-radius:8px;padding:0.8rem 1rem;margin-bottom:1.2rem;font-size:0.88rem;color:#333;line-height:1.6;">
                        <strong style="color:#555;">Job Description:</strong><br>${r.description}
                    </div>
                    <div style="display:flex;gap:0.7rem;flex-wrap:wrap;">
                        <button onclick="approveRequest(${r.id})" style="padding:9px 20px;background:#25D366;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;font-size:0.88rem;">
                            <i class="fas fa-check"></i> Approve & Assign
                        </button>
                        <button onclick="showReassignModal(${r.id})" style="padding:9px 20px;background:#1e90ff;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;font-size:0.88rem;">
                            <i class="fas fa-exchange-alt"></i> Reassign to Another
                        </button>
                        <button onclick="rejectRequest(${r.id})" style="padding:9px 20px;background:#CE1126;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;font-size:0.88rem;">
                            <i class="fas fa-times"></i> Reject
                        </button>
                    </div>
                </div>
            </div>`;
        }

        async function approveRequest(reqId) {
            const r = serviceRequests.find(x => x.id === reqId);
            if (!r) return;
            r.status = 'approved';
            r.adminNote = 'Your request has been approved. The artisan will contact you shortly.';
            await updateServiceRequest(r._docId || r.id, { status: r.status, adminNote: r.adminNote });
            showNotification(`Request approved for ${r.clientName} → ${r.artisanName}`, 'success');
            showSection('job-requests');
        }

        async function rejectRequest(reqId) {
            if (!confirm('Reject this request? The customer will be notified.')) return;
            const r = serviceRequests.find(x => x.id === reqId);
            if (!r) return;
            r.status = 'rejected';
            r.adminNote = 'Your request could not be fulfilled at this time. Please try again or contact support.';
            await updateServiceRequest(r._docId || r.id, { status: r.status, adminNote: r.adminNote });
            showNotification(`Request from ${r.clientName} rejected`, 'info');
            showSection('job-requests');
        }

        let reassignTargetId = null;
        function showReassignModal(reqId) {
            reassignTargetId = reqId;
            const r = serviceRequests.find(x => x.id === reqId);
            document.getElementById('reassign-label').textContent = `Reassigning request from ${r.clientName} (currently: ${r.artisanName})`;
            const sel = document.getElementById('reassign-artisan-sel');
            sel.innerHTML = '';
            sampleArtisans.filter(a => a.verified && a.id !== r.artisanId).forEach(a => {
                const o = document.createElement('option');
                o.value = a.id;
                o.textContent = `${a.name} — ${categories.find(c=>c.id===a.category)?.name||a.category} (${a.district})`;
                sel.appendChild(o);
            });
            const overlay = document.getElementById('reassign-overlay');
            overlay.style.display = 'flex';
        }

        function closeReassign(e) {
            if (!e || e.target === document.getElementById('reassign-overlay') || !e) {
                document.getElementById('reassign-overlay').style.display = 'none';
            }
        }

        async function confirmReassign() {
            const r = serviceRequests.find(x => x.id === reassignTargetId);
            if (!r) return;
            const selId = parseInt(document.getElementById('reassign-artisan-sel').value);
            const newArtisan = sampleArtisans.find(a => a.id === selId);
            const note = document.getElementById('reassign-note').value.trim();
            r.artisanId   = newArtisan.id;
            r.artisanName = newArtisan.name;
            r.status      = 'reassigned';
            r.adminNote   = note || `You have been reassigned to ${newArtisan.name} who will be in touch shortly.`;
            await updateServiceRequest(r._docId || r.id, { artisanId: r.artisanId, artisanName: r.artisanName, status: r.status, adminNote: r.adminNote });
            // Push to new artisan's jobRequests and save
            newArtisan.jobRequests = newArtisan.jobRequests || [];
            newArtisan.jobRequests.push({
                id: newArtisan.jobRequests.length + 1,
                clientName: r.clientName, clientPhone: r.clientPhone, clientEmail: r.clientEmail,
                description: r.description, date: new Date().toISOString().split('T')[0], status: 'pending'
            });
            await saveArtisanProfile(newArtisan);
            document.getElementById('reassign-overlay').style.display = 'none';
            showNotification(`Request reassigned to ${newArtisan.name}`, 'success');
            showSection('job-requests');
        }

        // ---- Revenue Actions ----
        async function markRevenuePaid(reqId) {
            const r = serviceRequests.find(x => x.id === reqId);
            if (r) {
                r.paymentStatus = 'paid';
                await updateServiceRequest(r._docId || r.id, { paymentStatus: 'paid' });
                showNotification(`✅ Payment from ${r.clientName} marked as received!`, 'success');
                showSection('payments');
            }
        }

        async function setRevenueAmount(reqId) {
            const amt = prompt('Enter the amount received from client (e.g. 450):');
            if (!amt || isNaN(parseFloat(amt))) { showNotification('Invalid amount', 'error'); return; }
            const r = serviceRequests.find(x => x.id === reqId);
            if (r) {
                r.amount = `₵${parseFloat(amt).toFixed(2)}`;
                r.paymentStatus = 'pending';
                await updateServiceRequest(r._docId || r.id, { amount: r.amount, paymentStatus: 'pending' });
                showNotification(`Amount set to ₵${parseFloat(amt).toFixed(2)}`, 'success');
                showSection('payments');
            }
        }

        // ---- Expenditure Actions ----
        async function recordExpenditure() {
            const artisanId = parseInt(document.getElementById('exp-artisan').value);
            const amount    = parseFloat(document.getElementById('exp-amount').value);
            const client    = document.getElementById('exp-client').value.trim();
            const monthRaw  = document.getElementById('exp-month').value;

            if (!artisanId) { showNotification('Please select an artisan', 'error'); return; }
            if (!amount || amount <= 0) { showNotification('Please enter a valid amount', 'error'); return; }

            const artisan = sampleArtisans.find(a => a.id === artisanId);
            if (!artisan) { showNotification('Artisan not found', 'error'); return; }
            if (!artisan.payments) artisan.payments = [];

            let monthLabel = 'This Month';
            if (monthRaw) {
                const [yr, mo] = monthRaw.split('-');
                monthLabel = new Date(parseInt(yr), parseInt(mo)-1, 1)
                    .toLocaleDateString('en-GH', { month:'long', year:'numeric' });
            }

            artisan.payments.push({
                id:     Date.now(),
                client: client || 'Admin Payment',
                amount: `₵${amount.toFixed(2)}`,
                date:   new Date().toISOString().split('T')[0],
                status: 'pending',
                month:  monthLabel
            });
            await saveArtisanProfile(artisan);

            document.getElementById('exp-artisan').value = '';
            document.getElementById('exp-amount').value  = '';
            document.getElementById('exp-client').value  = '';
            document.getElementById('exp-month').value   = '';

            showNotification(`₵${amount.toFixed(2)} payment recorded for ${artisan.name}`, 'success');
            showSection('payments');
            setTimeout(() => { if (window.showPayTab) window.showPayTab('expenditure'); }, 100);
        }

        async function markExpenditurePaid(artisanId, payId) {
            const artisan = sampleArtisans.find(a => a.id === artisanId);
            if (!artisan) return;
            const pay = artisan.payments.find(p => p.id === payId);
            if (pay) {
                pay.status = 'completed';
                await saveArtisanProfile(artisan);
                showNotification(`✅ Payment to ${artisan.name} marked as paid!`, 'success');
                showSection('payments');
                setTimeout(() => { if (window.showPayTab) window.showPayTab('expenditure'); }, 100);
            }
        }

        // ---- PDF Generation ----
        function generatePDF(type) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const today = new Date().toLocaleDateString('en-GH');
            const logo  = 'GhanaArtisan Platform';

            // Header helper
            function addHeader(title) {
                doc.setFillColor(0, 102, 0);
                doc.rect(0, 0, 210, 28, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(16); doc.setFont('helvetica','bold');
                doc.text(logo, 14, 12);
                doc.setFontSize(11); doc.setFont('helvetica','normal');
                doc.text(title, 14, 21);
                doc.text(`Generated: ${today}`, 196, 21, { align: 'right' });
                doc.setTextColor(0, 0, 0);
            }

            if (type === 'artisans') {
                addHeader('Artisans Report');
                doc.autoTable({
                    startY: 35,
                    head: [['Name','Category','Region','District','Phone','Verified','Jobs']],
                    body: sampleArtisans.map(a => [
                        a.name, a.category || '—', a.region || '—', a.district || '—',
                        a.phone || '—', a.verified ? 'Yes' : 'No',
                        (a.jobRequests || []).length
                    ]),
                    headStyles: { fillColor: [0, 102, 0] },
                    alternateRowStyles: { fillColor: [240, 249, 240] }
                });
                doc.save(`Artisans_Report_${today.replace(/\//g,'-')}.pdf`);

            } else if (type === 'payments') {
                addHeader('Payments Report');
                const revenue = serviceRequests.filter(r => r.amount && parseFloat(r.amount.replace('₵','')) > 0);
                doc.setFontSize(12); doc.setFont('helvetica','bold');
                doc.text('Revenue (From Clients)', 14, 40);
                doc.autoTable({
                    startY: 45,
                    head: [['Client','Artisan','Description','Amount','Status','Date']],
                    body: revenue.map(r => [
                        r.clientName, r.artisanName,
                        (r.description || '').substring(0,40),
                        r.amount || '—', r.paymentStatus || 'pending', r.date || '—'
                    ]),
                    headStyles: { fillColor: [255, 153, 0] }
                });
                let y = doc.lastAutoTable.finalY + 15;
                doc.setFontSize(12); doc.setFont('helvetica','bold');
                doc.text('Expenditure (To Artisans)', 14, y);
                const exp = [];
                sampleArtisans.forEach(a => (a.payments||[]).forEach(p => exp.push({...p, artisan: a.name})));
                doc.autoTable({
                    startY: y + 5,
                    head: [['Artisan','Client','Amount','Month','Status','Date']],
                    body: exp.map(p => [p.artisan, p.client||'—', p.amount||'—', p.month||'—', p.status||'pending', p.date||'—']),
                    headStyles: { fillColor: [0, 102, 0] }
                });
                doc.save(`Payments_Report_${today.replace(/\//g,'-')}.pdf`);

            } else if (type === 'jobs') {
                addHeader('Job Requests Report');
                doc.autoTable({
                    startY: 35,
                    head: [['Client','Artisan','Category','Description','Date','Status']],
                    body: serviceRequests.map(r => [
                        r.clientName, r.artisanName, r.category || '—',
                        (r.description||'').substring(0,35),
                        r.date || '—', r.status || '—'
                    ]),
                    headStyles: { fillColor: [30, 144, 255] },
                    alternateRowStyles: { fillColor: [240, 245, 255] }
                });
                doc.save(`Job_Requests_Report_${today.replace(/\//g,'-')}.pdf`);

            } else if (type === 'payslip') {
                const artisanId = parseInt(document.getElementById('payslip-artisan-sel').value);
                const a = sampleArtisans.find(x => x.id === artisanId);
                if (!a) { showNotification('Please select an artisan', 'error'); return; }
                addHeader(`Payslip — ${a.name}`);
                doc.setFontSize(11);
                doc.text(`Artisan: ${a.name}`, 14, 38);
                doc.text(`Category: ${a.category || '—'}`, 14, 45);
                doc.text(`Region: ${a.region || '—'}`, 14, 52);
                doc.text(`Phone: ${a.phone || '—'}`, 14, 59);
                const payments = a.payments || [];
                const total = payments.reduce((s,p) => s + parseFloat((p.amount||'0').replace('₵','')||0), 0);
                doc.autoTable({
                    startY: 68,
                    head: [['Client','Amount','Month','Status','Date']],
                    body: payments.map(p => [p.client||'—', p.amount||'—', p.month||'—', p.status||'pending', p.date||'—']),
                    headStyles: { fillColor: [155, 89, 182] }
                });
                doc.setFontSize(12); doc.setFont('helvetica','bold');
                doc.text(`Total Paid: ₵${total.toFixed(2)}`, 14, doc.lastAutoTable.finalY + 12);
                doc.save(`Payslip_${a.name.replace(/ /g,'_')}_${today.replace(/\//g,'-')}.pdf`);

            } else if (type === 'invoice') {
                const reqId = document.getElementById('invoice-req-sel').value;
                const r = serviceRequests.find(x => String(x.id) === String(reqId));
                if (!r) { showNotification('Please select a service request', 'error'); return; }
                addHeader('Service Invoice');
                doc.setFillColor(248, 248, 248);
                doc.rect(14, 35, 182, 60, 'F');
                doc.setFontSize(11); doc.setFont('helvetica','normal');
                doc.text(`Invoice To:`, 18, 44);
                doc.setFont('helvetica','bold');
                doc.text(r.clientName, 18, 51);
                doc.setFont('helvetica','normal');
                doc.text(`Phone: ${r.clientPhone || '—'}`, 18, 58);
                doc.text(`Service Provider:`, 110, 44);
                doc.setFont('helvetica','bold');
                doc.text(r.artisanName, 110, 51);
                doc.setFont('helvetica','normal');
                doc.text(`Category: ${r.category || '—'}`, 110, 58);
                doc.text(`Invoice Date: ${today}`, 18, 72);
                doc.text(`Service Date: ${r.date || '—'}`, 110, 72);
                doc.autoTable({
                    startY: 102,
                    head: [['Description','Address','Urgency','Amount','Status']],
                    body: [[
                        (r.description||'').substring(0,50),
                        (r.address||r.district||'—'),
                        r.urgency || 'Normal',
                        r.amount || 'TBD',
                        r.paymentStatus || 'pending'
                    ]],
                    headStyles: { fillColor: [206, 17, 38] }
                });
                const amtNum = parseFloat((r.amount||'0').replace('₵','')) || 0;
                doc.setFontSize(13); doc.setFont('helvetica','bold');
                doc.text(`Total Amount: ${amtNum > 0 ? '₵' + amtNum.toFixed(2) : 'To Be Confirmed'}`, 14, doc.lastAutoTable.finalY + 15);
                doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(150,150,150);
                doc.text('GhanaArtisan Platform — Connecting Clients with Verified Artisans across Ghana', 105, 285, { align: 'center' });
                doc.save(`Invoice_${r.clientName.replace(/ /g,'_')}_${today.replace(/\//g,'-')}.pdf`);
            }
        }

        // ---- Update Work Update Admin Status ----
        async function updateWUAdminStatus(docId, wuId, customerName, artisanName) {
            const sel    = document.getElementById(`wu-admin-status-${wuId}`);
            const status = sel ? sel.value : 'in_progress';

            // Update in global workUpdates collection
            try {
                await updateServiceRequest(docId, { adminStatus: status, status });
            } catch(e) {
                // fallback: save directly
                await saveDoc('workUpdates', docId, { adminStatus: status, status });
            }

            // Also update in artisan profile
            const artisan = sampleArtisans.find(a =>
                (a.workUpdates || []).some(w => w.id == wuId || w.id === wuId)
            );
            if (artisan) {
                const wu = artisan.workUpdates.find(w => w.id == wuId || w.id === wuId);
                if (wu) {
                    wu.adminStatus = status;
                    wu.status      = status;
                    await saveArtisanProfile(artisan);
                }
            }

            // Update the service request status so customer sees it in their portal
            const req = serviceRequests.find(r =>
                r.clientName === customerName && r.artisanName === artisanName && r.status !== 'rejected'
            );
            if (req) {
                const newReqStatus = status === 'completed' || status === 'verified' ? 'completed' : 'approved';
                req.status = newReqStatus;
                await updateServiceRequest(req._docId || req.id, { status: newReqStatus });
            }

            const label = status === 'completed' ? 'Completed' : status === 'verified' ? 'Verified & Approved' : 'In Progress';
            showNotification(`✅ Status updated to "${label}" — customer portal updated!`, 'success');
            showSection('work-updates');
        }

        // ---- Verify / Reject ----
        async function verifyArtisan(id) {
            const a = sampleArtisans.find(x => x.id === id);
            if (a) {
                a.verified = true;
                await saveArtisanProfile(a);
                showNotification(`✅ ${a.name} is now verified and visible on the platform!`, 'success');
                showSection('verifications');
            }
        }

        async function rejectArtisan(id) {
            if (confirm('Reject this artisan? They will be removed and must re-register.')) {
                const a = sampleArtisans.find(x => x.id === id);
                const idx = sampleArtisans.findIndex(x => x.id === id);
                if (idx !== -1) {
                    const name = sampleArtisans[idx].name;
                    sampleArtisans.splice(idx, 1);
                    if (a?._docId) await deleteDoc_('artisans', a._docId);
                    const saved = loadArtisanProfile();
                    if (saved && saved.email === a?.email) clearArtisanProfile();
                    showNotification(`${name} rejected and removed.`, 'info');
                    showSection('verifications');
                }
            }
        }
    </script>
